spring.application.name=financial-data-processing

# # MySQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finance_dbase?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Sac@placement47}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver




# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:YourSecretKeyForJWTGenerationShouldBeAtLeast32CharactersLong}
app.jwt.expiration-ms=86400000

# Server Configuration
server.port=${PORT:8080}

# Logging
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=DEBUG
